# Conda environment: stablecoinmustflow
# Create: conda env create -f environment.yml
# Activate: conda activate stablecoinmustflow

name: stablecoinmustflow
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.11
  - pip
  - pip:
    - dune-client>=1.7.0
    - yfinance>=0.2.0
    - pandas>=2.0.0
    - pyarrow>=14.0.0
    - google-cloud-storage>=2.0.0
    - python-dotenv>=1.0.0
